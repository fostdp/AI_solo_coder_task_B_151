global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: 'waterwheel-monitor'
    cluster: 'production'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'waterwheel-backend'
    metrics_path: '/api/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'waterwheel-backend'
          layer: 'application'

  - job_name: 'waterwheel-frontend'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['frontend:80']
        labels:
          service: 'waterwheel-frontend'
          layer: 'frontend'

  - job_name: 'timescaledb'
    static_configs:
      - targets: ['timescale:5432']
        labels:
          service: 'timescaledb'
          layer: 'database'
    params:
      format: ['prometheus']
    metrics_path: '/metrics'

  - job_name: 'mosquitto'
    static_configs:
      - targets: ['mosquitto:1883']
        labels:
          service: 'mosquitto'
          layer: 'messaging'
